---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - name: Check i3 binary
      ansible.builtin.command: which i3
      register: i3_bin
      changed_when: false

    - name: Assert i3 is installed
      ansible.builtin.assert:
        that: i3_bin.rc == 0
        fail_msg: "i3 binary not found in PATH"

    - name: Run i3 --version
      ansible.builtin.command: i3 --version
      register: i3_version
      changed_when: false

    - name: Assert i3 version output
      ansible.builtin.assert:
        that: "'i3' in i3_version.stdout | lower"
        fail_msg: "i3 --version did not produce expected output"

    - name: Check i3 config directory
      ansible.builtin.stat:
        path: ~/.config/i3
      register: i3_dir

    - name: Assert i3 config directory exists
      ansible.builtin.assert:
        that: i3_dir.stat.exists and i3_dir.stat.isdir
        fail_msg: "~/.config/i3 directory not found"

    - name: Check i3 config file
      ansible.builtin.stat:
        path: ~/.config/i3/config
      register: i3_conf

    - name: Assert i3 config exists
      ansible.builtin.assert:
        that: i3_conf.stat.exists
        fail_msg: "~/.config/i3/config not found"

    - name: Check i3 dunstrc
      ansible.builtin.stat:
        path: ~/.config/i3/dunstrc
      register: dunstrc

    - name: Assert dunstrc exists
      ansible.builtin.assert:
        that: dunstrc.stat.exists
        fail_msg: "~/.config/i3/dunstrc not found"

    - name: Check i3 background image
      ansible.builtin.stat:
        path: ~/.config/i3/background.jpg
      register: i3_bg

    - name: Assert background image exists
      ansible.builtin.assert:
        that: i3_bg.stat.exists
        fail_msg: "~/.config/i3/background.jpg not found"

    - name: Check xinitrc symlink
      ansible.builtin.stat:
        path: ~/.xinitrc
      register: xinitrc

    - name: Assert xinitrc exists
      ansible.builtin.assert:
        that: xinitrc.stat.exists
        fail_msg: "~/.xinitrc not found"

- name: Verify uninstall path
  hosts: all
  gather_facts: true
  tasks:
    - name: Locate i3 binary before uninstall
      ansible.builtin.command: which i3
      register: i3_bin_before
      changed_when: false

    - name: Run role in uninstall mode
      ansible.builtin.include_role:
        name: jahrik.i3_gaps
      vars:
        install: false

    # i3 is an X11 window manager and cannot be executed in an unprivileged
    # container, so only stat the binary path resolved above rather than
    # running it.
    - name: Stat i3 binary after uninstall
      ansible.builtin.stat:
        path: "{{ i3_bin_before.stdout }}"
      register: i3_bin_after

    - name: Assert i3 binary is absent after uninstall
      ansible.builtin.assert:
        that: not i3_bin_after.stat.exists
        fail_msg: "i3 binary still present after uninstall"

    - name: Check i3 config directory after uninstall
      ansible.builtin.stat:
        path: ~/.config/i3
      register: i3_dir_after

    - name: Assert i3 config directory is absent after uninstall
      ansible.builtin.assert:
        that: not i3_dir_after.stat.exists
        fail_msg: "~/.config/i3 directory still present after uninstall"

    - name: Check xinitrc after uninstall
      ansible.builtin.stat:
        path: ~/.xinitrc
      register: xinitrc_after

    - name: Assert xinitrc is absent after uninstall
      ansible.builtin.assert:
        that: not xinitrc_after.stat.exists
        fail_msg: "~/.xinitrc still present after uninstall"
