---
- name: Uninstall i3
  become: true
  ansible.builtin.package:
    name:
      - i3-gaps
      - i3lock
      - i3status
    state: absent
  tags:
    - i3

- name: Destroy ~/.config/i3 directory
  become: false
  ansible.builtin.file:
    path: ~/.config/i3
    state: absent
  tags:
    - i3

- name: Remove xinitrc
  become: false
  ansible.builtin.file:
    path: ~/.xinitrc
    state: absent
  tags:
    - i3
