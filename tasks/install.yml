---
- name: Include OS-specific tasks
  ansible.builtin.include_tasks: "{{ ansible_facts['os_family'] | lower }}.yml"
  when: ansible_facts['os_family'] in ['Archlinux', 'Debian']

- name: Fail on unsupported OS
  ansible.builtin.fail:
    msg: "Unsupported OS family: {{ ansible_facts['os_family'] }}. This role supports Archlinux and Debian."
  when: ansible_facts['os_family'] not in ['Archlinux', 'Debian']

- name: Create ~/.config/i3 directory
  become: false
  ansible.builtin.file:
    path: "~/.config/i3"
    state: directory
    mode: "0755"
  tags: [ 'i3' ]

- name: Generate i3 config files
  become: false
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "~/.config/i3/{{ item }}"
    mode: "0644"
  loop:
    - config
    - conkyrc
    - dunstrc
    - xinitrc
    - xmodmap
  tags: [ 'i3' ]

- name: Symlink xinitrc
  become: false
  ansible.builtin.file:
    src: "~/.config/i3/xinitrc"
    dest: "~/.xinitrc"
    state: link
  tags: [ 'i3' ]

- name: Create ~/screenshots dir for scrot
  become: false
  ansible.builtin.file:
    path: "~/screenshots/"
    state: directory
    mode: "0755"
  tags: [ 'i3' ]

- name: Set default background image for feh
  become: false
  ansible.builtin.copy:
    src: background.jpg
    dest: "~/.config/i3/background.jpg"
    mode: "0644"
  tags: [ 'i3' ]
