---
- name: Install i3 and related packages
  become: true
  ansible.builtin.apt:
    name:
      - i3
      - i3lock
      - i3status
    update_cache: true
    cache_valid_time: 3600
  tags: ['i3']

- name: Install i3 extras
  become: true
  ansible.builtin.package:
    name:
      - conky-all
      - dmenu
      - dunst
      - feh
      - rxvt-unicode
      - scrot
      - fonts-dejavu
      - udiskie
  tags: ['i3']
