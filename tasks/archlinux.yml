---
- name: Update pacman cache
  become: true
  community.general.pacman:
    update_cache: true
  changed_when: false
  when: ansible_os_family == 'Archlinux'
  tags: ['i3']

- name: Install i3
  become: true
  community.general.pacman:
    name:
      - i3
      - i3lock
      - i3status
    state: present
  when: ansible_os_family == 'Archlinux'
  tags: ['i3']

- name: Install i3 extras
  become: true
  community.general.pacman:
    name:
      - conky
      - dmenu
      - dunst
      - feh
      - scrot
      - xcalib
      - xf86-input-synaptics
      - xorg-xmodmap
      - xorg-xrdb
      - xorg-server
      - xorg-xinit
      - xorg-xrandr
    state: present
  when: ansible_os_family == 'Archlinux'
  tags: ['i3']
